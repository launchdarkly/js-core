name: sdk/react nightly

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-example:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./actions/setup-yarn
        with:
          node-version: 24
      - uses: ./actions/run-example
        with:
          workspace_name: '@launchdarkly/react-sdk-example-hello-react'
          aws_assume_role: ${{ vars.AWS_ROLE_ARN }}
          before_test: 'yarn workspace @launchdarkly/react-sdk-example-hello-react playwright install --with-deps chromium'
