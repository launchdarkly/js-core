name: Dependency Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  generate-nodejs-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./actions/setup-yarn
        with:
          node-version: 24.x

      - name: Install released package dependencies
        run: yarn workspaces focus $(node scripts/released-packages.js)
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
          YARN_ENABLE_SCRIPTS: 'false'
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Generate SBOM
        uses: launchdarkly/gh-actions/actions/dependency-scan/generate-sbom@719c66e7dc9a39c5767105d9b32c659239372ad0 # main
        with:
          types: 'nodejs'
          ensure-non-empty: 'true'

  evaluate-policy:
    runs-on: ubuntu-latest
    needs:
      - generate-nodejs-sbom
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Evaluate SBOM Policy
        uses: launchdarkly/gh-actions/actions/dependency-scan/evaluate-policy@719c66e7dc9a39c5767105d9b32c659239372ad0 # main
        with:
          artifacts-pattern: bom-*
