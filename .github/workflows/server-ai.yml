name: sdk/server-ai

on:
  push:
    branches: [main, 'feat/**']
    paths-ignore:
      - '**.md' #Do not need to run CI for markdown changes.
  pull_request:
    branches: [main, 'feat/**']
    paths-ignore:
      - '**.md'

jobs:
  build-test-server-sdk-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./actions/setup-yarn
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
      - id: shared
        name: Shared CI Steps
        uses: ./actions/ci
        with:
          workspace_name: '@launchdarkly/server-sdk-ai'
          workspace_path: packages/sdk/server-ai
      - name: Type-check all server-ai examples
        run: |
          set -e
          for dir in packages/sdk/server-ai/examples/getting-started/*/*/ packages/sdk/server-ai/examples/features/*/; do
            name=$(node -p "require('./$dir/package.json').name")
            echo "::group::Type-checking $name ($dir)"
            yarn workspaces focus "$name"
            yarn workspaces foreach -pR --topological-dev --from "{$name,@launchdarkly/node-server-sdk-otel}" run build
            (cd "$dir" && npx tsc --noEmit)
            echo "::endgroup::"
          done
