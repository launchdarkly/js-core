name: sdk/react

on:
  push:
    branches: [main, 'feat/**']
    paths-ignore:
      - '**.md' #Do not need to run CI for markdown changes.
  pull_request:
    branches: [main, 'feat/**']
    paths-ignore:
      - '**.md'

jobs:
  build-test-react:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node versions to run on.
        version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.version }}
          registry-url: 'https://registry.npmjs.org'
      - id: shared
        name: Shared CI Steps
        uses: ./actions/ci
        with:
          workspace_name: '@launchdarkly/react-sdk'
          workspace_path: packages/sdk/react

      # Contract Tests
      - name: Install contract test dependencies
        run: |
          yarn workspaces focus @launchdarkly/react-sdk @launchdarkly/react-sdk-contract-tests browser-contract-test-adapter
          yarn workspace @launchdarkly/react-sdk-contract-tests build
      - name: Install Playwright browsers
        run: yarn workspace @launchdarkly/react-sdk-contract-tests install-playwright-browsers
      - name: Launch contract test services
        run: |
          yarn workspace @launchdarkly/react-sdk-contract-tests run start:adapter &> /tmp/adapter.log &
          yarn workspace @launchdarkly/react-sdk-contract-tests run start:entity &> /tmp/entity.log &
          echo "Waiting for adapter on port 8000..."
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Adapter ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Timeout waiting for adapter"
              cat /tmp/adapter.log
              exit 1
            fi
            sleep 1
          done
          echo "Waiting for entity on port 8002..."
          for i in {1..30}; do
            if curl -s http://localhost:8002 > /dev/null; then
              echo "Entity ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Timeout waiting for entity"
              cat /tmp/entity.log
              exit 1
            fi
            sleep 1
          done
          yarn workspace @launchdarkly/react-sdk-contract-tests run start:browser &> /tmp/browser.log &
          sleep 5
      - name: Run contract tests
        uses: launchdarkly/gh-actions/actions/contract-tests@5adb11fd6953e1bc35d9cf1fc1b4374c464e3a8b
        with:
          test_service_port: 8000
          token: ${{ secrets.GITHUB_TOKEN }}
          extra_params: '--skip-from=${{ github.workspace }}/packages/sdk/react/contract-tests/suppressions.txt --stop-service-at-end'
