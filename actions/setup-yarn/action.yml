name: Setup Node and Yarn
description: Sets up Node.js and enables corepack so the pinned yarn version (from packageManager) is used.
inputs:
  node-version:
    description: 'Node.js version to install.'
    required: false
    default: '24.x'
  registry-url:
    description: 'Optional npm registry URL to configure for setup-node.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}

    - name: Enable corepack
      shell: bash
      run: corepack enable
